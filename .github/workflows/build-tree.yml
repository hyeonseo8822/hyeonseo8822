name: Build Christmas Tree
on:
  schedule:
    - cron: "0 18 * * *"   # 매일 한국 시간 새벽 3시에 자동 갱신
  workflow_dispatch:        # 수동으로도 실행 가능하게 설정
    inputs:
      theme:
        description: "Background theme"
        type: choice
        default: default
        options: [default, space, winter, sky]
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate tree
        uses: chromeheartz/merry-gitmas@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          theme: ${{ inputs.theme || 'default' }}
          width: 350
          output: profile-tree.svg

      - name: Commit SVG
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update christmas tree 🎄"
          file_pattern: profile-tree.svg
